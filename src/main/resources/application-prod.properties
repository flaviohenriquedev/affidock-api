server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/affidock
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

affidock.security.jwt.secret=affidock-super-secret-key-change-me-affidock-super-secret
affidock.security.jwt.access-expiration-seconds=900
affidock.security.jwt.refresh-expiration-seconds=2592000

affidock.security.allowed-origins=http://localhost:3000
