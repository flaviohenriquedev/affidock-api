spring.datasource.url=jdbc:h2:mem:affidock-api;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Evita tentar rodar scripts SQL (não existem neste projeto)
spring.sql.init.mode=never
spring.flyway.enabled=false

affidock.security.jwt.secret=test-affidock-secret-test-affidock-secret
affidock.security.jwt.access-expiration-seconds=900
affidock.security.jwt.refresh-expiration-seconds=2592000

